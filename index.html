<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Global Situation Room</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700&display=swap" rel="stylesheet"/>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;overflow:hidden;background:#040408;}
    #sr-root{background:#080808;color:#c8c8c8;font-family:'Share Tech Mono',monospace;height:100vh;display:flex;flex-direction:column;overflow:hidden;}
    #sr-header{display:flex;align-items:center;justify-content:space-between;padding:10px 20px;border-bottom:1px solid #1e1e1e;background:#0c0c0c;flex-shrink:0;}
    #sr-title{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;letter-spacing:3px;color:#e8e8e8;}
    #sr-status{font-size:9px;color:#555;letter-spacing:1px;}
    #sr-time{font-size:10px;color:#777;letter-spacing:2px;min-width:120px;text-align:right;}
    #breaking-bar{background:#0e0e0e;border-bottom:1px solid #1e1e1e;display:flex;align-items:stretch;flex-shrink:0;height:27px;overflow:hidden;}
    #breaking-label{background:#cc2200;color:#fff;font-size:8px;letter-spacing:2px;padding:0 12px;display:flex;align-items:center;flex-shrink:0;font-weight:700;}
    #ticker-track{flex:1;overflow:hidden;}
    #ticker-inner{display:flex;align-items:center;height:100%;white-space:nowrap;animation:ticker 80s linear infinite;}
    #ticker-inner:hover{animation-play-state:paused;}
    @keyframes ticker{0%{transform:translateX(100%)}100%{transform:translateX(-200%)}}
    .ticker-item{font-size:10px;color:#aaa;padding:0 28px;letter-spacing:.5px;}
    .ticker-sep{color:#333;font-size:12px;}
    #tab-bar{display:flex;border-bottom:1px solid #1e1e1e;background:#0a0a0a;flex-shrink:0;}
    .tab-btn{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:2px;padding:8px 20px;cursor:pointer;background:none;border:none;color:#444;border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase;}
    .tab-btn:hover{color:#aaa;}
    .tab-btn.active{color:#e0e0e0;border-bottom:2px solid #e0e0e0;}
    #tab-map{flex:1;position:relative;overflow:hidden;background:#070d1a;cursor:grab;min-height:0;}
    #tab-map:active{cursor:grabbing;}
    #tab-headlines{flex:1;overflow-y:auto;display:none;background:#080808;flex-direction:column;min-height:0;}
    #tab-headlines::-webkit-scrollbar{width:4px;}
    #tab-headlines::-webkit-scrollbar-thumb{background:#2a2a2a;}
    #map-svg{position:absolute;top:0;left:0;width:100%;height:100%;}
    .country{fill:#111418;stroke:none;}
    .country:hover{fill:#1c2430;}
    .borders-countries{fill:none;stroke:#3a4a5a;stroke-width:0.25;pointer-events:none;opacity:0.6;}
    .borders-continents{fill:none;stroke:#d0e4f0;stroke-width:0.85;pointer-events:none;}
    .graticule{fill:none;stroke:#090f1c;stroke-width:0.3;pointer-events:none;}
    .sphere{fill:#060c18;stroke:#0c1828;stroke-width:0.5;}
    .pin-group{cursor:pointer;}
    .pin-dot{transition:r .15s;}
    .pin-group:hover .pin-dot{r:7;}
    .pin-ring{animation:pulse 2.2s infinite ease-out;fill:none;stroke-width:1;}
    @keyframes pulse{0%{r:7;opacity:.7}80%{r:18;opacity:0}100%{r:7;opacity:0}}
    #zoom-controls{position:absolute;top:14px;left:14px;display:flex;flex-direction:column;gap:2px;z-index:20;}
    .zoom-btn{background:rgba(6,12,24,0.92);border:1px solid #2a3040;color:#667788;font-family:'Share Tech Mono',monospace;font-size:15px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
    .zoom-btn:hover{color:#cce;border-color:#556688;}
    #filter-bar{position:absolute;top:14px;right:14px;display:flex;flex-direction:column;gap:3px;z-index:20;}
    .filter-btn{background:rgba(6,12,24,0.92);border:1px solid #2a3040;color:#556677;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1.5px;padding:5px 11px;cursor:pointer;text-transform:uppercase;transition:all .15s;}
    .filter-btn:hover,.filter-btn.active{color:#ddeeff;border-color:#7799bb;background:rgba(15,25,45,0.95);}
    #legend{position:absolute;bottom:14px;left:14px;background:rgba(5,9,18,0.92);border:1px solid #182030;padding:8px 12px;z-index:10;font-size:9px;letter-spacing:1px;}
    .legend-row{display:flex;align-items:center;gap:7px;margin:3px 0;color:#55667788;}
    .legend-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;}
    #tooltip{position:absolute;background:#060c18;border:1px solid #2a3a50;padding:11px 15px;max-width:250px;pointer-events:none;opacity:0;transition:opacity .12s;z-index:100;}
    #tooltip.visible{opacity:1;}
    #tt-region{font-size:9px;color:#44607a;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px;}
    #tt-cat{display:inline-block;font-size:8px;padding:2px 6px;margin-bottom:6px;letter-spacing:1px;text-transform:uppercase;}
    #tt-headline{font-size:11px;color:#d0d8e0;line-height:1.55;margin-bottom:5px;}
    #tt-source{font-size:9px;color:#384858;}
    .cat-conflict{background:#2e1010;color:#ff7070;border:1px solid #4e1a1a;}
    .cat-economy{background:#102010;color:#70ff70;border:1px solid #1a3a1a;}
    .cat-politics{background:#10102e;color:#7090ff;border:1px solid #1a1a4e;}
    .cat-climate{background:#102828;color:#70ffff;border:1px solid #1a4040;}
    .cat-crisis{background:#281808;color:#ffaa40;border:1px solid #442808;}
    .dot-conflict{fill:#ff7070;}.dot-economy{fill:#70ff70;}.dot-politics{fill:#7090ff;}.dot-climate{fill:#70ffff;}.dot-crisis{fill:#ffaa40;}
    .ring-conflict{stroke:#ff7070;}.ring-economy{stroke:#70ff70;}.ring-politics{stroke:#7090ff;}.ring-climate{stroke:#70ffff;}.ring-crisis{stroke:#ffaa40;}
    #detail-panel{flex-shrink:0;background:#070d1a;border-top:1px solid #182030;padding:0 20px;display:flex;align-items:center;gap:14px;height:0;overflow:hidden;transition:height .25s;}
    #detail-panel.open{height:46px;}
    #dp-tag{font-size:8px;padding:2px 6px;letter-spacing:1px;text-transform:uppercase;flex-shrink:0;}
    #dp-region{font-size:9px;color:#3a4a5a;letter-spacing:2px;flex-shrink:0;}
    #dp-headline{font-size:11px;color:#bbb;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    #dp-source{font-size:9px;color:#2e3e4e;flex-shrink:0;}
    #dp-close{font-size:10px;color:#3a4a5a;cursor:pointer;margin-left:8px;}
    #dp-close:hover{color:#aaa;}
    #hl-toolbar{display:flex;align-items:center;gap:8px;padding:12px 20px;border-bottom:1px solid #141e28;flex-shrink:0;flex-wrap:wrap;}
    .hl-filter{background:none;border:1px solid #1e2a38;color:#445566;font-family:'Share Tech Mono',monospace;font-size:8px;letter-spacing:1.5px;padding:4px 10px;cursor:pointer;text-transform:uppercase;transition:all .15s;}
    .hl-filter:hover,.hl-filter.active{color:#ddeeff;border-color:#5577aa;}
    #hl-count{font-size:9px;color:#2a3a4a;margin-left:auto;letter-spacing:1px;}
    .hl-item{display:flex;align-items:flex-start;gap:14px;padding:13px 20px;border-bottom:1px solid #0c1620;cursor:pointer;transition:background .12s;}
    .hl-item:hover{background:#0a1520;}
    .hl-item.breaking{border-left:2px solid #cc2200;}
    .hl-left{flex-shrink:0;display:flex;flex-direction:column;align-items:center;gap:5px;padding-top:2px;}
    .hl-num{font-size:8px;color:#253545;width:22px;text-align:center;}
    .hl-dot{width:8px;height:8px;border-radius:50%;}
    .hl-break-badge{font-size:7px;color:#cc2200;letter-spacing:1px;}
    .hl-body{flex:1;min-width:0;}
    .hl-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px;flex-wrap:wrap;}
    .hl-region{font-size:8px;color:#3a5268;letter-spacing:1.5px;text-transform:uppercase;}
    .hl-cat-badge{font-size:7px;padding:1px 5px;letter-spacing:1px;text-transform:uppercase;}
    .hl-headline{font-size:12px;color:#c8d0d8;line-height:1.55;margin-bottom:3px;}
    .hl-source{font-size:9px;color:#2a3e50;display:flex;align-items:center;gap:8px;}

</head>
<body>
<div id="sr-root">
  <div id="sr-header">
    <div id="sr-title">Global Situation Room</div>
    <div id="sr-status">LIVE FEED</div>
    <div id="sr-time">--:--:-- UTC</div>
  </div>
  <div id="breaking-bar">
    <div id="breaking-label">BREAKING</div>
    <div id="ticker-track"><div id="ticker-inner"></div></div>
  </div>
  <div id="tab-bar">
    <button class="tab-btn active" data-tab="map">MAP VIEW</button>
    <button class="tab-btn" data-tab="headlines">HEADLINES</button>
  </div>
  <div id="tab-map">
    <svg id="map-svg" xmlns="http://www.w3.org/2000/svg"></svg>
    <div id="tooltip">
      <div id="tt-region"></div><div id="tt-cat"></div>
      <div id="tt-headline"></div><div id="tt-source"></div>
    </div>
    <div id="zoom-controls">
      <button class="zoom-btn" id="zoom-in">+</button>
      <button class="zoom-btn" id="zoom-out">−</button>
      <button class="zoom-btn" id="zoom-reset" style="font-size:11px;">⌂</button>
    </div>
    <div id="filter-bar">
      <button class="filter-btn active" data-cat="all">ALL</button>
      <button class="filter-btn" data-cat="conflict">CONFLICT</button>
      <button class="filter-btn" data-cat="economy">ECONOMY</button>
      <button class="filter-btn" data-cat="politics">POLITICS</button>
      <button class="filter-btn" data-cat="climate">CLIMATE</button>
      <button class="filter-btn" data-cat="crisis">CRISIS</button>
    </div>
    <div id="legend">
      <div class="legend-row"><div class="legend-dot" style="background:#ff7070"></div>CONFLICT</div>
      <div class="legend-row"><div class="legend-dot" style="background:#70ff70"></div>ECONOMY</div>
      <div class="legend-row"><div class="legend-dot" style="background:#7090ff"></div>POLITICS</div>
      <div class="legend-row"><div class="legend-dot" style="background:#70ffff"></div>CLIMATE</div>
      <div class="legend-row"><div class="legend-dot" style="background:#ffaa40"></div>CRISIS</div>
    </div>
  </div>
  <div id="tab-headlines">
    <div id="hl-toolbar">
      <button class="hl-filter active" data-hcat="all">ALL</button>
      <button class="hl-filter" data-hcat="conflict">CONFLICT</button>
      <button class="hl-filter" data-hcat="economy">ECONOMY</button>
      <button class="hl-filter" data-hcat="politics">POLITICS</button>
      <button class="hl-filter" data-hcat="climate">CLIMATE</button>
      <button class="hl-filter" data-hcat="crisis">CRISIS</button>
      <button class="hl-filter" data-hcat="breaking">BREAKING ONLY</button>
      <span id="hl-count"></span>
    </div>
    <div id="hl-list"></div>
  </div>
  <div id="detail-panel">
    <div id="dp-tag"></div><div id="dp-region"></div>
    <div id="dp-headline"></div><div id="dp-source"></div>
    <div id="dp-close">[ CLOSE ]</div>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>

const dotColors={conflict:'#ff7070',economy:'#70ff70',politics:'#7090ff',climate:'#70ffff',crisis:'#ffaa40'};

document.getElementById('sr-status').textContent='LIVE FEED — '+events.length+' INCIDENTS MONITORED';

const ti=document.getElementById('ticker-inner');
events.filter(e=>e.breaking).forEach(ev=>{
  const s=document.createElement('span');s.className='ticker-item';
  s.textContent=ev.region+' — '+ev.headline;ti.appendChild(s);
  const sep=document.createElement('span');sep.className='ticker-sep';sep.textContent='◆';ti.appendChild(sep);
});

let hlFilter='all';
function renderHeadlines(){
  const list=document.getElementById('hl-list');list.innerHTML='';
  let f=hlFilter==='breaking'?events.filter(e=>e.breaking):hlFilter==='all'?[...events]:events.filter(e=>e.cat===hlFilter);
  f=[...f.filter(e=>e.breaking),...f.filter(e=>!e.breaking)];
  document.getElementById('hl-count').textContent=f.length+' ITEMS';
  f.forEach((ev,i)=>{
    const div=document.createElement('div');
    div.className='hl-item'+(ev.breaking?' breaking':'');
    const linkHTML=ev.url&&ev.url!=='#'
      ?`<a href="${ev.url}" target="_blank" style="color:#3a5a7a;font-size:9px;text-decoration:none;letter-spacing:1px;" onclick="event.stopPropagation()">READ →</a>`:'';
    div.innerHTML=`
      <div class="hl-left">
        <div class="hl-num">${String(i+1).padStart(2,'0')}</div>
        <div class="hl-dot" style="background:${dotColors[ev.cat]}"></div>
        ${ev.breaking?'<div class="hl-break-badge">BRK</div>':''}
      </div>
      <div class="hl-body">
        <div class="hl-meta">
          <span class="hl-region">${ev.region}</span>
          <span class="hl-cat-badge cat-${ev.cat}">${ev.cat}</span>
          <span style="font-size:8px;color:#2a3a4a;margin-left:auto;">${ev.date||''}</span>
        </div>
        <div class="hl-headline">${ev.headline}</div>
        <div class="hl-source">SOURCE: ${ev.source} ${linkHTML}</div>
      </div>`;
    div.addEventListener('click',()=>openDetail(ev));
    list.appendChild(div);
  });
}
document.querySelectorAll('.hl-filter').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.hl-filter').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');hlFilter=btn.dataset.hcat;renderHeadlines();
  });
});
renderHeadlines();

document.querySelectorAll('.tab-btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    const t=btn.dataset.tab;
    document.getElementById('tab-map').style.display=t==='map'?'block':'none';
    const hl=document.getElementById('tab-headlines');
    hl.style.display=t==='headlines'?'flex':'none';
    if(t==='headlines')hl.style.flexDirection='column';
  });
});

function openDetail(ev){
  const tag=document.getElementById('dp-tag');
  tag.textContent=ev.breaking?'● BREAKING':ev.cat;
  tag.className=ev.breaking?'cat-conflict':'cat-'+ev.cat;
  document.getElementById('dp-region').textContent=ev.region;
  document.getElementById('dp-headline').textContent=ev.headline;
  document.getElementById('dp-source').textContent=ev.source;
  document.getElementById('detail-panel').classList.add('open');
}
document.getElementById('dp-close').addEventListener('click',()=>{
  document.getElementById('detail-panel').classList.remove('open');
});

let activeFilter='all',projectionFn,pathFn,pinsLayer,svgSel,zoomBehavior;

async function init(){
  const container=document.getElementById('tab-map');
  const W=container.clientWidth||900;
  const H=container.clientHeight||540;
  svgSel=d3.select('#map-svg').attr('viewBox',`0 0 ${W} ${H}`).attr('preserveAspectRatio','xMidYMid meet');
  projectionFn=d3.geoNaturalEarth1().scale(W/5.9).translate([W/2,H/2]);
  pathFn=d3.geoPath().projection(projectionFn);
  const mapGroup=svgSel.append('g').attr('id','map-group');
  mapGroup.append('path').datum({type:'Sphere'}).attr('class','sphere').attr('d',pathFn);
  mapGroup.append('path').datum(d3.geoGraticule().step([20,20])()).attr('class','graticule').attr('d',pathFn);
  let world;
  try{
    const res=await fetch('https://cdn.jsdelivr.net/npm/world-atlas@2/countries-50m.json');
    world=await res.json();
  }catch(e){
    svgSel.append('text').attr('x',W/2).attr('y',H/2).attr('text-anchor','middle').attr('fill','#445').attr('font-size','13').text('Map data unavailable');
    return;
  }
  const countries=topojson.feature(world,world.objects.countries);
  const countryBorders=topojson.mesh(world,world.objects.countries,(a,b)=>a!==b);
  const coastlines=topojson.mesh(world,world.objects.countries,(a,b)=>a===b);
  mapGroup.selectAll('.country').data(countries.features).join('path').attr('class','country').attr('d',pathFn);
  mapGroup.append('path').datum(countryBorders).attr('class','borders-countries').attr('d',pathFn);
  mapGroup.append('path').datum(coastlines).attr('class','borders-continents').attr('d',pathFn);
  pinsLayer=mapGroup.append('g').attr('id','pins-layer');
  renderPins();
  zoomBehavior=d3.zoom().scaleExtent([1,14]).on('zoom',(event)=>{
    mapGroup.attr('transform',event.transform);
    pinsLayer.selectAll('.pin-dot').attr('r',4/Math.sqrt(event.transform.k));
  });
  svgSel.call(zoomBehavior);
  svgSel.on('dblclick.zoom',null);
  document.getElementById('zoom-in').addEventListener('click',()=>svgSel.transition().duration(300).call(zoomBehavior.scaleBy,1.6));
  document.getElementById('zoom-out').addEventListener('click',()=>svgSel.transition().duration(300).call(zoomBehavior.scaleBy,0.625));
  document.getElementById('zoom-reset').addEventListener('click',()=>svgSel.transition().duration(400).call(zoomBehavior.transform,d3.zoomIdentity));
  document.querySelectorAll('.filter-btn').forEach(btn=>{
    btn.addEventListener('click',()=>{
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');activeFilter=btn.dataset.cat;renderPins();
    });
  });
}

function renderPins(){
  if(!pinsLayer)return;
  pinsLayer.selectAll('*').remove();
  const filtered=activeFilter==='all'?events:events.filter(e=>e.cat===activeFilter);
  const container=document.getElementById('tab-map');
  const tooltip=document.getElementById('tooltip');
  filtered.forEach(ev=>{
    const[px,py]=projectionFn([ev.lng,ev.lat]);
    if(px==null||py==null)return;
    const g=pinsLayer.append('g').attr('class','pin-group');
    if(ev.breaking)g.append('circle').attr('cx',px).attr('cy',py).attr('class','pin-ring ring-'+ev.cat).attr('r',10).style('animation-delay',(ev.id*.2)+'s');
    g.append('circle').attr('cx',px).attr('cy',py).attr('r',4).attr('class','pin-dot dot-'+ev.cat);
    if(ev.breaking)g.append('circle').attr('cx',px).attr('cy',py-4).attr('r',2.5).attr('fill','#cc2200');
    g.on('mouseenter',function(event){
      document.getElementById('tt-region').textContent=ev.region;
      const c=document.getElementById('tt-cat');
      c.textContent=ev.breaking?ev.cat+' — BREAKING':ev.cat;c.className='cat-'+ev.cat;
      document.getElementById('tt-headline').textContent=ev.headline;
      document.getElementById('tt-source').textContent='SOURCE: '+ev.source+' · '+ev.date;
      tooltip.classList.add('visible');positionTooltip(event,container);
    }).on('mousemove',e=>positionTooltip(e,container))
      .on('mouseleave',()=>tooltip.classList.remove('visible'))
      .on('click',()=>openDetail(ev));
  });
}

function positionTooltip(event,container){
  const rect=container.getBoundingClientRect();
  let x=event.clientX-rect.left+14,y=event.clientY-rect.top+14;
  const tt=document.getElementById('tooltip');
  if(x+255>rect.width)x=event.clientX-rect.left-260;
  if(y+145>rect.height)y=event.clientY-rect.top-150;
  tt.style.left=x+'px';tt.style.top=y+'px';
}

function updateClock(){
  const n=new Date(),p=v=>String(v).padStart(2,'0');
  document.getElementById('sr-time').textContent=p(n.getUTCHours())+':'+p(n.getUTCMinutes())+':'+p(n.getUTCSeconds())+' UTC';
}
setInterval(updateClock,1000);updateClock();
init();
</script>
